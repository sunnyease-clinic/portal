name: Keep Portal Alive

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:      # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Streamlit
        run: |
          curl -sL https://sunnyease.streamlit.app/ > /dev/null
          echo "Pinged at $(date)"
